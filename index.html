<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="NewStore - Loja online com diversos produtos, ofertas e entrega rápida">
    <link rel="stylesheet" href="./assets/css/reset.css">
    <link rel="stylesheet" href="./assets/css/global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>NewStore | Loja Online de Produtos</title>
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <h1>New<span>Store</span></h1>
            </div>

            <div class="search">
                <input type="search" id="search" placeholder="Buscar produtos...">
            </div>

            <div id="cart" aria-label="Carrinho de compras">
                <label for="search" class="sr-only">Buscar produtos</label>
                <i class="fa-solid fa-cart-shopping"></i>
                <span id="cart-count">0</span>
            </div>
        </nav>
    </header>
    <main>
        <section id="root" aria-label="Lista de produtos">

        </section>
    </main>

    <script type="module" src="./assets/js/main.js"></script>
</body>

</html>
